ollama:
  ollama:
    gpu:
      enabled: true
    models:
      create:
      - name: "omnicoder-9b-16k"
        template: |
          FROM carstenuhlig/omnicoder-9b:q4_k_m
          PARAMETER num_ctx 16384
      run:
      - "omnicoder-9b-16k"
  httpRoute:
    enabled: true
    parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: gateway-internal
      namespace: kube-system
    hostnames:
    - ollama.nwallace.io
  nodeSelector:
    kubernetes.io/hostname: arch-desktop
