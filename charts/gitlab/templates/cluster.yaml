apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: gitlab
  annotations:
    helm.sh/resource-policy: keep
  labels:
    {{- include "commonLabels" . | nindent 4 }}
    workload: database
spec:
  resources:
    limits:
        memory: "500Mi"
  instances: 3
  switchoverDelay: 60
  smartShutdownTimeout: 120
  stopDelay: 60
  primaryUpdateStrategy: unsupervised
  primaryUpdateMethod: switchover
  inheritedMetadata:
    labels:
      {{- include "commonLabels" . | nindent 6 }}
  postgresql:
    parameters:
      max_connections: '200'
  affinity:
    podAntiAffinityType: required
    nodeSelector:
      storage: 'true'
  # minSyncReplicas: 1
  # maxSyncReplicas: 2
  imageName: {{ .Values.dbImage }}
  imagePullPolicy: Always
  bootstrap:
    # initdb:
    #   database: gitlabhq_production
    #   owner: gitlab
    #   secret:
    #     name: gitlab-postgresql-password
    #   postInitSQL:
    #     - CREATE EXTENSION IF NOT EXISTS btree_gist
    #     - CREATE EXTENSION IF NOT EXISTS pg_trgm
    #     - CREATE EXTENSION IF NOT EXISTS plpgsql
    recovery:
      source: gitlab
      database: gitlab-old
      owner: gitlab
      secret:
        name: gitlab-postgresql-password
  managed:
    roles:
    - name: gitlab
      connectionLimit: -1
      inherit: true
      ensure: present
      login: true
      passwordSecret:
        name: gitlab-postgresql-password
  storage:
    pvcTemplate:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 8Gi
      storageClassName: longhorn-db
      volumeMode: Filesystem
  walStorage:
    pvcTemplate:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 3Gi
      storageClassName: longhorn-db
      volumeMode: Filesystem
  postgresql:
    parameters:
      max_slot_wal_keep_size: 2GB
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: gitlab
  externalClusters:
    - name: gitlab
      plugin:
          name: barman-cloud.cloudnative-pg.io
          parameters:
            barmanObjectName: gitlab
            serverName: gitlab
  monitoring:
    enablePodMonitor: true