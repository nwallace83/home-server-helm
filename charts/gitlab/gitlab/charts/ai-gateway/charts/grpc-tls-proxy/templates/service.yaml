{{- if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "grpc-tls-proxy.fullname" . }}
  labels:
    {{- include "grpc-tls-proxy.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.port }}
      targetPort: grpc-tls
      protocol: TCP
      name: grpc-tls
      appProtocol: grpc
  selector:
    {{- include "grpc-tls-proxy.selectorLabels" . | nindent 4 }}
{{- end }}
