{{- if and .Values.ingress.enabled .Values.duoWorkflow.enabled -}}
{{- $fullName := include "ai-gateway.fullname" . -}}
{{- $proxy := index .Values "grpc-tls-proxy" -}}
{{- $grpcServiceName := ternary (printf "%s-grpc-tls-proxy" .Release.Name) $fullName $proxy.enabled -}}
{{- $duoWorkflowPort := ternary $proxy.port .Values.duoWorkflow.port $proxy.enabled -}}
{{- $annotations := deepCopy .Values.grpcIngress.annotations -}}
{{- if $proxy.enabled -}}
{{- $_ := set $annotations "nginx.ingress.kubernetes.io/backend-protocol" "GRPCS" -}}
{{- end -}}
{{- if and .Values.ingress.className (not (semverCompare ">=1.18-0" .Capabilities.KubeVersion.GitVersion)) }}
  {{- if not (hasKey $annotations "kubernetes.io/ingress.class") }}
  {{- $_ := set $annotations "kubernetes.io/ingress.class" .Values.ingress.className}}
  {{- end }}
{{- end }}
{{- if semverCompare ">=1.19-0" .Capabilities.KubeVersion.GitVersion -}}
apiVersion: networking.k8s.io/v1
{{- else if semverCompare ">=1.14-0" .Capabilities.KubeVersion.GitVersion -}}
apiVersion: networking.k8s.io/v1beta1
{{- else -}}
apiVersion: extensions/v1beta1
{{- end }}
kind: Ingress
metadata:
  name: {{ $fullName }}-grpc
  labels:
    {{- include "ai-gateway.labels" . | nindent 4 }}
  annotations:
    {{- toYaml $annotations | nindent 4 }}
spec:
  {{- if and .Values.ingress.className (semverCompare ">=1.18-0" .Capabilities.KubeVersion.GitVersion) }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.grpcIngress.tls }}
  tls:
    {{- range .Values.grpcIngress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.grpcIngress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            {{- if and .pathType (semverCompare ">=1.18-0" $.Capabilities.KubeVersion.GitVersion) }}
            pathType: {{ .pathType }}
            backend:
              {{- if semverCompare ">=1.19-0" $.Capabilities.KubeVersion.GitVersion }}
              service:
                name: {{ $grpcServiceName }}
                port:
                  number: {{ $duoWorkflowPort }}
              {{- else }}
              serviceName: {{ $grpcServiceName }}
              servicePort: {{ $duoWorkflowPort }}
              {{- end }}
            {{- end }}
          {{- end }}
    {{- end }}
{{- end }}
