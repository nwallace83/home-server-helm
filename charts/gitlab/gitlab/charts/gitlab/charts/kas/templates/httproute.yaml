{{- if .Values.global.kas.enabled -}}
{{- if eq "true" (include "gitlab.gatewayApi.route.enabled" .) -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ template "fullname" . }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "gitlab.standardLabels" $ | nindent 4 }}
    {{- include "gitlab.commonLabels" $ | nindent 4 }}
  annotations:
    {{ .Values.gatewayRoute.annotations | toYaml | nindent 4 }}
spec:
  parentRefs:
  {{- include "gitlab.gatewayApi.gatewayRef" . | nindent 4 }}
  hostnames:
    - {{ include "gitlab.kas.hostname" . | quote }}
  rules:
  - backendRefs:
    - kind: Service
      name: {{ template "gitlab.kas.serviceName" . }}
      port: {{ .Values.service.kubernetesApiPort }}
      weight: 1
    {{- with .Values.gatewayRoute.filters }}
    filters:
      {{- . | toYaml | nindent 6 }}
    {{- end }}
    matches:
    - path:
        type: PathPrefix
        value: {{ .Values.ingress.k8sApiPath | quote }}
    {{/* GRPC connections are long living. */}}
    timeouts:
      request: 0s
  - backendRefs:
    - kind: Service
      name: {{ template "gitlab.kas.serviceName" . }}
      port: {{ .Values.service.externalPort }}
      weight: 1
    {{- with .Values.gatewayRoute.filters }}
    filters:
      {{- . | toYaml | nindent 6 }}
    {{- end }}
    matches:
    - path:
        type: PathPrefix
        value: {{ .Values.ingress.agentPath | quote }}
    {{/* GRPC connections are long living. */}}
    timeouts:
      request: 0s
  {{- if (.Values.autoflow).enabled }}
  - backendRefs:
    - kind: Service
      name: {{ template "gitlab.kas.serviceName" . }}
      port: {{ .Values.service.autoflowCodecServerApiPort }}
      weight: 1
    {{- with .Values.gatewayRoute.filters }}
    filters:
      {{- . | toYaml | nindent 6 }}
    {{- end }}
    matches:
    - path:
        type: PathPrefix
        value: {{ .Values.ingress.autoflowCodecServerApiPath | quote }}
    {{/* GRPC connections are long living. */}}
    timeouts:
      request: 0s
  {{- end }}
  {{- if .Values.global.workspaces.enabled }}
  - backendRefs:
    - kind: Service
      name: {{ template "gitlab.kas.serviceName" . }}
      port: {{ .Values.service.workspacesServerPort }}
      weight: 1
    {{- with .Values.gatewayRoute.filters }}
    filters:
      {{- . | toYaml | nindent 6 }}
    {{- end }}
    matches:
    - path:
        type: PathPrefix
        value: {{ .Values.ingress.workspacesServerApiPath | quote }}
    {{/* GRPC connections are long living. */}}
    timeouts:
      request: 0s
  {{- end }}
{{- end }}
{{- end }}