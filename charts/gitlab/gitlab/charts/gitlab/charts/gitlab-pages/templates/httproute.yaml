{{- $externalAddresses := concat $.Values.global.pages.externalHttp $.Values.global.pages.externalHttps | uniq }}
{{- if empty $externalAddresses }}
{{- if eq "true" (include "gitlab.gatewayApi.route.enabled" .) }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ template "fullname" . }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "gitlab.standardLabels" $ | nindent 4 }}
    {{- include "gitlab.commonLabels" $ | nindent 4 }}
  annotations:
    {{ .Values.gatewayRoute.annotations | toYaml | nindent 4 }}
spec:
  parentRefs:
  {{- include "gitlab.gatewayApi.gatewayRef" . | nindent 4 }}
  hostnames:
    {{- $hostname := (include "gitlab.pages.hostname" .) }}
    {{- if $.Values.global.pages.namespaceInPath }}
    - {{ $hostname | quote }}
    {{- else }}
    - {{ printf "*.%s" $hostname | quote }}
    {{- end }}
  rules:
  - backendRefs:
    - kind: Service
      name: {{ template "fullname" . }}
      port: {{ .Values.service.externalPort }}
      weight: 1
    {{- with .Values.gatewayRoute.filters }}
    filters:
      {{- . | toYaml | nindent 6 }}
    {{- end }}
    {{- with .Values.gatewayRoute.timeouts }}
    timeouts:
      {{- . | toYaml | nindent 6 }}
    {{- end }}
    matches:
    - path:
        type: PathPrefix
        value: /
{{- end }}
{{- end }}