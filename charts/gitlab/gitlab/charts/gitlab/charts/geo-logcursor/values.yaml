# Default values for geo-logcursor.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
image: {}
  # pullPolicy: IfNotPresent
  # pullSecrets: []
  # repository: registry.gitlab.com/gitlab-org/build/cng/gitlab-geo-logcursor
  # tag: master
init:
  image: {}
    # repository:
    # tag:
  resources:
    requests:
      cpu: 50m
  containerSecurityContext: {}
enabled: true
replicaCount: 1
global:
  geo:
    role: primary
    nodeName:
    psql:
      # host: '0.0.0.0'
      # port: '5432'
      # database: 'gitlabhq_geo_production'
      # username: 'gitlab_replicator'
      password: {}
      #   secret: gitlab-geo-postgres
      #   key: postgresql-password
      # ssl:
      #   secret: gitlab-ssl-secret
      #   clientKey: client-key.pem
      #   clientCertificate: client-cert.pem
      #   serverCA: server-ca.pem
  redis:
    auth: {}
  hosts:
    domain: example.com
    hostSuffix:
    https: true
    gitlab: {}
      #name: gitlab.example.com
      #https: false
    registry: {}
      #name: registry.example.com
      #https: false

redis:
  auth: {}
psql: {}
gitaly:
  # host: '0.0.0.0'
  # port: 8075
  # serviceName: 'gitaly'
  authToken: {}
  #   secret: gitaly-secret
  #   key: token
resources:
  # limits:
  #  cpu: 1
  #  memory: 1.5G
  requests:
    cpu: 300m
    memory: 1G

deployment:
  livenessProbe:
    initialDelaySeconds: 20
    periodSeconds: 60
    timeoutSeconds: 30
    successThreshold: 1
    failureThreshold: 3
  readinessProbe:
    initialDelaySeconds: 0
    periodSeconds: 10
    timeoutSeconds: 2
    successThreshold: 1
    failureThreshold: 3
  strategy: {}
  # revisionHistoryLimit: 10

nodeSelector: {}
tolerations: []
affinity:
  podAntiAffinity:
    topologyKey:
  nodeAffinity:
       key:
       values:

podLabels: {}
common:
  labels: {}

# Priority class assigned to pods
priorityClassName: ""

## Allow to overwrite under which User and Group the Pod will be running.
securityContext:
  runAsUser: 1000
  fsGroup: 1000
  # fsGroupChangePolicy: OnRootMismatch

## Allow to overwrite the specific security context under which the container is running.
containerSecurityContext:
  runAsUser: 1000

## Enable deployment to use a serviceAccount
serviceAccount:
  enabled: false
  create: false
  annotations: {}
  ## Used for local override of global ServiceAccount token mounting
  # automountServiceAccountToken: false
  ## Name to be used for serviceAccount, otherwise defaults to chart fullname
  # name:

## Topology spread constraints rely on node labels to identify the topology domain(s) that each Node is in.
## Ref: https://kubernetes.io/docs/concepts/workloads/pods/pod-topology-spread-constraints/
topologySpreadConstraints: []
 # - labelSelector:
 #     matchLabels:
 #       app: name
 #     maxSkew: 1
 #     topologyKey: topology.kubernetes.io/zone
 #     whenUnsatisfiable: DoNotSchedule
