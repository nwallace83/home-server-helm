dbImage: harbor.nwallace.io/github/cloudnative-pg/postgresql:17

global:
  hosts:
    domain: nwallace.io
    externalIP: 192.168.2.12
  monitoring:
    enabled: true
  certificates:
    image:
      repository: harbor.nwallace.io/gitlab/gitlab-org/build/cng/certificates
  gatewayApi:
    enabled: true
    installEnvoy: false
    configureCertmanager: false
    httpToHttpsRedirect: false
    gatewayRef:
      name: gateway-external
      namespace: kube-system
  gitlabBase:
    image:
      repository: harbor.nwallace.io/gitlab/gitlab-org/build/cng/gitlab-base
  kubectl:
    image:
      repository: harbor.nwallace.io/gitlab/gitlab-org/build/cng/kubectl
  minio:
    enabled: false
  psql:
    host: gitlab-db-rw
    username: gitlab
    database: gitlab
    password:
      secret: gitlab-postgresql-password
      key: password
  ingress:
    enabled: false
    configureCertmanager: false
  redis:
    auth:
      enabled: false
    host: gitlab-valkey
  nodeSelector:
    kubernetes.io/arch: amd64
  appConfig:
    object_store:
      enabled: true
      proxy_download: false
      connection:
        secret: gitlab-minio
    backups:
      bucket: gitlab-backups
    defaultProjectsFeatures:
      containerRegistry: false
    dependencyProxy:
      enabled: true
      bucket: gitlab-dependency-proxy
  common:
    labels:
      backstage.io/kubernetes-id: gitlab
  registry:
    enabled: false
gitlab:
  gatewayApiResources:
    gateway:
      protocol: HTTP
  installCertmanager: false
  gitlab-runner:
    runners:
      locked: null
      config: |
        [[runners]]
          [runners.kubernetes]
          image = "ubuntu:22.04"
          privileged = true
          [[runners.kubernetes.volumes.empty_dir]]
            name = "docker-certs"
            mount_path = "/certs/client"
            medium = "Memory"
          [runners.kubernetes.node_selector]
            "kubernetes.io/hostname" = "server"
          {{- if .Values.global.minio.enabled }}
          [runners.cache]
            Type = "s3"
            Path = "gitlab-runner"
            Shared = true
            [runners.cache.s3]
              ServerAddress = {{ include "gitlab-runner.cache-tpl.s3ServerAddress" . }}
              BucketName = "runner-cache"
              BucketLocation = "us-east-1"
              Insecure = false
          {{ end }}
  postgresql:
    install: false
  gitlab:
    sidekiq:
      resources:
        requests:
          cpu: 50m
      minReplicas: 1
      maxReplicas: 1
      image:
        repository: harbor.nwallace.io/gitlab/gitlab-org/build/cng/gitlab-sidekiq-ee
    gitaly:
      persistence:
        storageClass: longhorn
        size: 5Gi
      image:
        repository: harbor.nwallace.io/gitlab/gitlab-org/build/cng/gitaly
    kas:
      gatewayRoute:
        sectionName: https
      minReplicas: 1
      maxReplicas: 1
      image:
        repository: harbor.nwallace.io/gitlab/gitlab-org/build/cng/gitlab-kas
    gitlab-shell:
      gatewayRoute:
        sectionName: ssh
      minReplicas: 1
      maxReplicas: 1
      service:
        type: LoadBalancer
        loadBalancerIP: 192.168.2.16
      image:
        repository: harbor.nwallace.io/gitlab/gitlab-org/build/cng/gitlab-shell
    webservice:
      gatewayRoute:
        sectionName: https
      resources:
        requests:
          cpu: 50m
        limits:
          memory: 4Gi
      nodeSelector:
        kubernetes.io/hostname: server
      minReplicas: 1
      maxReplicas: 1
      image:
        repository: harbor.nwallace.io/gitlab/gitlab-org/build/cng/gitlab-webservice-ee
      gitlab:
        applicationSettings:
          webIdeExtensionHostDomain: "gitlab.nwallace.io"
          webIdeDisableSingleOriginFallback: true
        webservice:
          workhorse:
            image: harbor.nwallace.io/gitlab/gitlab-org/build/cng/gitlab-workhorse-ee
    toolbox:
      persistence:
        enabled: true
        size: 2Gi
        storageClass: longhorn-db
      backups:
        cron:
          enabled: false
          persistence:
            enabled: true
            size: 2Gi
            storageClass: longhorn-db
        objectStorage:
          config:
            secret: gitlab-minio
            key: config
      image:
        repository: harbor.nwallace.io/gitlab/gitlab-org/build/cng/gitlab-toolbox-ee
    gitlab-exporter:
      image:
        repository: harbor.nwallace.io/gitlab/gitlab-org/build/cng/gitlab-exporter
        tag: 16.7.0
    migrations:
      image:
        repository: harbor.nwallace.io/gitlab/gitlab-org/build/cng/gitlab-toolbox-ee
      init:
        image:
          repository: harbor.nwallace.io/gitlab/gitlab-org/build/cng/gitlab-base
  nginx-ingress:
    enabled: false
  redis:
    master:
      nodeSelector:
        kubernetes.io/arch: amd64
      persistence:
        storageClass: longhorn
        size: 1Gi
    image:
      registry: harbor.nwallace.io/docker-hub
  registry:
    hpa:
      minReplicas: 1
      maxReplicas: 1
    enabled: false
  webservice:
    minReplicas: 1
    maxReplicas: 1
  prometheus:
    install: false
  upgradeCheck:
    enabled: false
  shared-secrets:
    selfsign:
      image:
        repository: harbor.nwallace.io/gitlab/gitlab-org/build/cng/cfssl-self-sign
  certmanagerIssuer:
    enabled: false
valkey:
  enabled: true
  auth:
    enabled: false
  master:
    nodeSelector:
      kubernetes.io/arch: amd64
    persistence:
      storageClass: longhorn
      size: 1Gi
  image:
    registry: harbor.nwallace.io/docker-hub
