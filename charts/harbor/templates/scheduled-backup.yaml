apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: {{ printf "%s-backup" .Release.Name }}
  labels:
    {{- include "commonLabels" . | nindent 4 }}
spec:
  backupOwnerReference: cluster
  cluster:
    name: {{ .Release.Name }}
  immediate: true
  schedule: 0 10 6 * * *
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io